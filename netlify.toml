[build]
  publish = "public"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Redirect /api/* to Netlify functions so frontend calls stay clean
[[redirects]]
  from = "/api/content"
  to   = "/.netlify/functions/content"
  status = 200

[[redirects]]
  from = "/api/health"
  to   = "/.netlify/functions/health"
  status = 200