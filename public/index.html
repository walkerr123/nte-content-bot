  currentPlatform = btn.dataset.platform;
  loadFeed();
}

function refresh() { if (!loading) loadFeed(); }

async function loadFeed() {
  if (loading) return;
  loading = true;
  const btn = document.getElementById('btn-refresh');
  btn.classList.add('spinning');
  document.getElementById('feed-meta').textContent = 'fetching guides...';
  document.getElementById('feed-count').textContent = '—';

  document.getElementById('feed').innerHTML = [1,2,3].map(() => `
    <div class="skeleton">
      <div style="display:flex;gap:8px;margin-bottom:14px">
        <div class="skel-line" style="width:52px"></div>
        <div class="skel-line" style="width:90px"></div>
        <div class="skel-line" style="width:110px"></div>
      </div>
      <div class="skel-line" style="width:72%;height:15px;margin-bottom:18px"></div>
      <div class="skel-line"></div>
      <div class="skel-line" style="width:92%"></div>
      <div class="skel-line" style="width:68%"></div>
    </div>`).join('');

  await new Promise(r => setTimeout(r, 800));

  let data = [], live = false;
  try {
    const res = await fetch(`/api/content?limit=6&platform=${currentPlatform}`);
    if (res.ok) { const j = await res.json(); if (j.success && j.data?.length) { data = j.data; live = true; } }
  } catch(e) {}
  if (!data.length) data = MOCK;

  document.getElementById('s-total').textContent = data.length;
  document.getElementById('s-done').textContent  = data.length;
  document.getElementById('s-queue').textContent = 0;
  document.getElementById('feed-count').textContent = data.length;
  document.getElementById('feed-meta').textContent =
    `${data.length} guides · ${live ? 'live' : 'demo'} · ${new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}`;

  if (!data.length) {
    document.getElementById('feed').innerHTML = `<div class="empty"><svg viewBox="0 0 24 24" stroke-width="1.5"><path d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg><p>No guide posts found right now.<br><b>Try refreshing in a few minutes.</b></p></div>`;
  } else {
    document.getElementById('feed').innerHTML = data.map((item, i) => card(item, i)).join('');
  }

  btn.classList.remove('spinning');
  loading = false;
}

function card(item, i) {
  const { post, plan } = item;
  const id = `c${i}`;
  const ub = plan.urgency === 'high' ? `<span class="badge b-urg-h">⚡ high urgency</span>`
           : plan.urgency === 'medium' ? `<span class="badge b-urg-m">● medium</span>`
           : `<span class="badge b-urg-l">● low</span>`;
  const ds = post.published ? new Date(post.published).toLocaleDateString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}) : '';
  const wc = post.summary ? Math.round(post.summary.split(' ').length)+'w' : '';
  const ss = (plan.short_form?.script_outline||[]).map((s,n)=>`<li><span class="step-n">${n+1}</span>${s}</li>`).join('');
  const ls = (plan.long_form?.sections||[]).map((s,n)=>`<li><span class="step-n">${n+1}</span>${s}</li>`).join('');
  const th = (plan.thumbnail_texts||[]).map(t=>`<div class="thumb-card"><p>${t}</p></div>`).join('');
  const tg = (plan.hashtags||[]).map(h=>`<span class="hashtag" onclick="copyTag('${h}')">${h}</span>`).join('');
  return `
<div class="card" style="animation-delay:${i*90}ms" id="${id}">
  <div class="card-top">
    <div class="card-badges">
      <span class="badge b-done">Done</span>
      <span class="badge b-type">${plan.content_type||'Guide'}</span>
      <span class="b-date">${ds}</span>
      ${ub}
    </div>
    <div class="card-meta">${wc?`<span>${wc}</span>`:''}<span>${post.source_name||'Reddit'}</span></div>
  </div>
  <div class="card-title"><a href="${post.link}" target="_blank" rel="noopener">${post.title}</a></div>
  <div class="card-tabs">
    <button class="tab-btn active" onclick="tab('${id}','s',this)">Summary</button>
    <button class="tab-btn" onclick="tab('${id}','p',this)">Content Plan</button>
    <button class="tab-btn" onclick="tab('${id}','t',this)">Thumbnails</button>
    <span class="tab-model">gemini-1.5-flash</span>
  </div>
  <div class="pane active" id="${id}-s">
    ${plan.hook?`<div class="hook-line">${plan.hook}</div>`:''}
    <div class="summary-box">
      <svg viewBox="0 0 24 24" stroke-width="1.5"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
      <p>${post.summary||'No summary available.'}</p>
    </div>
  </div>
  <div class="pane" id="${id}-p">
    <div class="plan-block">
      <div class="plan-label"><svg viewBox="0 0 24 24" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="2"/><path d="M9 7h6M9 11h6M9 15h4"/></svg>Short-form — ${plan.short_form?.platform||'TikTok / Shorts'} · ${plan.short_form?.duration||''}</div>
      <ul class="step-list">${ss}</ul>
    </div>
    <div class="plan-block">
      <div class="plan-label"><svg viewBox="0 0 24 24" stroke-width="2"><path d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/><path d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>Long-form — YouTube · ${plan.long_form?.duration||''}</div>
      ${plan.long_form?.title?`<div class="yt-title">${plan.long_form.title}</div>`:''}
      <ul class="step-list">${ls}</ul>
    </div>
    ${plan.urgency_reason?`<div class="urg-note">⏱ ${plan.urgency_reason}</div>`:''}
  </div>
  <div class="pane" id="${id}-t">
    <div class="thumb-grid">${th}</div>
  </div>
  <div class="hashtag-row">${tg}</div>
</div>`;
}

function tab(id, pane, btn) {
  document.querySelectorAll(`#${id} .tab-btn`).forEach(b=>b.classList.remove('active'));
  document.querySelectorAll(`#${id} .pane`).forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(`${id}-${pane}`).classList.add('active');
}

let toastT;
function copyTag(tag) {
  navigator.clipboard.writeText(tag).catch(()=>{});
  const t = document.getElementById('toast');
  document.getElementById('toast-msg').textContent = `Copied ${tag}`;
  t.classList.add('show');
  clearTimeout(toastT);
  toastT = setTimeout(()=>t.classList.remove('show'), 2200);
}

loadFeed();
</script>
</body>
</html>
