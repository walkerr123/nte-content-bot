<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />

<body>

<nav>

    Refresh

</nav>

<div class="page">
  <div class="eyebrow">Choose a source</div>
  <div class="platform-row">
    <button class="platform-btn active" data-platform="reddit" onclick="pickPlatform(this)">
      <svg viewBox="0 0 20 20"><path d="M10 0C4.478 0 0 4.478 0 10s4.478 10 10 10 10-4.478 10-10S15.522 0 10 0zm5.926 10.26c.04.19.06.387.06.585 0 2.996-3.589 5.427-8.012 5.427-4.42 0-8.009-2.43-8.009-5.427 0-.197.02-.394.059-.584a1.54 1.54 0 01-.626-1.254 1.545 1.545 0 012.721-1.001c1.332-.937 3.172-1.537 5.206-1.598l.99-4.6.058.013 3.18.68a1.069 1.069 0 102.013.495 1.07 1.07 0 00-1.07-1.069 1.07 1.07 0 00-.997.692l-2.836-.607-.888 4.112c2.02.07 3.847.67 5.172 1.603a1.545 1.545 0 012.718 1.003c0 .497-.235.938-.599 1.223l.06.507zM7.077 11.12a1.07 1.07 0 100-2.138 1.07 1.07 0 000 2.138zm5.539.74c-.68.681-2.023.734-2.412.734-.389 0-1.734-.053-2.413-.734a.267.267 0 00-.378.378c.87.87 2.395.945 2.791.945.396 0 1.922-.075 2.791-.945a.267.267 0 00-.379-.378zm-.462-2.877a1.07 1.07 0 100 2.139 1.07 1.07 0 000-2.139z"/></svg>
      Reddit
    </button>
    <button class="platform-btn" disabled>
      <svg viewBox="0 0 20 20"><path d="M11.997 8.56L18.52 1h-1.554l-5.672 6.29L6.75 1H1.5l6.845 9.52L1.5 18.5h1.554l5.984-6.637L14.25 18.5H19.5l-7.503-9.94zm-2.118 2.35l-.694-.947-5.517-7.52h2.376l4.455 6.074.693.947 5.788 7.892h-2.376l-4.725-6.446z"/></svg>
      Twitter / X <span class="soon-badge">soon</span>
    </button>
    <button class="platform-btn" disabled>
      <svg viewBox="0 0 20 20"><path d="M16.93 4.28A16.18 16.18 0 0013.13 3a.06.06 0 00-.07.03c-.17.3-.35.68-.48.98a14.93 14.93 0 00-4.16 0 9.52 9.52 0 00-.49-.98.06.06 0 00-.06-.03 16.13 16.13 0 00-3.8 1.28.06.06 0 00-.03.02C1.6 7.68 1.08 11 1.34 14.28a.07.07 0 00.03.05 16.28 16.28 0 004.72 2.3.07.07 0 00.07-.02c.36-.48.68-.98.96-1.51a.06.06 0 00-.04-.09 10.72 10.72 0 01-1.48-.68.06.06 0 010-.1c.1-.07.2-.14.3-.22a.06.06 0 01.06 0c3.1 1.37 6.46 1.37 9.52 0a.06.06 0 01.06.01c.1.07.2.15.3.21a.06.06 0 010 .1 9.72 9.72 0 01-1.49.68.06.06 0 00-.03.09c.28.53.6 1.03.95 1.51a.06.06 0 00.07.02 16.22 16.22 0 004.73-2.3.07.07 0 00.03-.05c.3-3.73-.5-6.98-2.1-9.98a.05.05 0 00-.03-.02zM7.17 12.38c-.9 0-1.63-.8-1.63-1.77 0-.98.72-1.77 1.63-1.77.92 0 1.64.8 1.63 1.77 0 .98-.72 1.77-1.63 1.77zm6.02 0c-.9 0-1.63-.8-1.63-1.77 0-.98.72-1.77 1.63-1.77.92 0 1.64.8 1.63 1.77 0 .98-.71 1.77-1.63 1.77z"/></svg>
      Discord <span class="soon-badge">soon</span>
    </button>
    <button class="platform-btn" disabled>
      <svg viewBox="0 0 20 20"><path d="M19.58 5.26a2.49 2.49 0 00-1.75-1.75C16.25 3.1 10 3.1 10 3.1s-6.25 0-7.83.41A2.49 2.49 0 00.42 5.26 26.08 26.08 0 000 10a26.08 26.08 0 00.42 4.74 2.49 2.49 0 001.75 1.75C3.75 16.9 10 16.9 10 16.9s6.25 0 7.83-.41a2.49 2.49 0 001.75-1.75A26.08 26.08 0 0020 10a26.08 26.08 0 00-.42-4.74zM8 13V7l5.2 3L8 13z"/></svg>
      YouTube <span class="soon-badge">soon</span>
    </button>
  </div>

  <div class="feed-header">
    <div class="feed-title">
      Guide Feed
      <span class="feed-count" id="feed-count">0</span>
    </div>
    <div class="feed-right">
      <span class="live-dot"></span>
      <span id="feed-meta">loading...</span>
    </div>
  </div>

  <div id="feed"></div>
</div>

<div class="toast" id="toast">
  <svg viewBox="0 0 24 24" stroke-width="2"><path d="M5 13l4 4L19 7"/></svg>
  <span id="toast-msg">Copied!</span>
</div>

<script>
const MOCK = [
  { post: { title: "Best F2P team builds after 1.1 patch — full tier breakdown", link: "#", summary: "After the 1.1 patch the meta shifted significantly. Daffodil now works as a solid off-field DPS and several older teams got indirect buffs through the anomaly rework. Full breakdown for players not spending — covering S-tier, A-tier, and budget picks with rotation notes.", published: "2026-05-29T08:30:00Z", source_name: "r/NevernessToEverness" }, plan: { hook: "F2P players just got a massive buff from the 1.1 patch changes", content_type: "Tier List", short_form: { platform: "TikTok / YouTube Shorts", duration: "45s", script_outline: ["Hook — 'the F2P meta just changed'", "Flash the S-tier free teams on screen", "Quick rotation demo for the best team", "CTA — comment your current team below"] }, long_form: { title: "Best F2P Teams After NTE 1.1 — Every Budget Build Ranked", duration: "10-14 mins", sections: ["Intro — what changed in 1.1 for free players", "S-tier free teams full breakdown", "Team rotations and skill priority order", "Mistakes new players make with these teams", "Outro + subscribe for weekly NTE guides"] }, thumbnail_texts: ["F2P TEAMS ARE BROKEN NOW 🔥", "1.1 PATCH CHANGED THE META", "FREE TIER LIST 2026"], hashtags: ["#NTE", "#NevernessToEverness", "#NTEguide", "#gachagaming", "#F2P"], urgency: "high", urgency_reason: "Patch just dropped — publish now to capture peak search traffic before bigger channels do." }, generated_at: "2026-05-29T09:00:00Z" },
  { post: { title: "City Tycoon max passive income — best business combos each reset", link: "#", summary: "After testing every business combination in the City Tycoon system I found the optimal setup for passive Pixel income each daily reset. Cafe + Auto Shop is the best early-game combo. Full numbers, upgrade order, and timing breakdown in this post.", published: "2026-05-28T20:00:00Z", source_name: "r/NevernessToEverness" }, plan: { hook: "This cafe and auto shop combo prints Pixels while you sleep", content_type: "Guide", short_form: { platform: "TikTok / YouTube Shorts", duration: "40s", script_outline: ["Hook — 'make Pixels doing nothing'", "Show the business combo setup on screen", "Flash the daily income numbers", "CTA — like for more tycoon tips"] }, long_form: { title: "NTE City Tycoon Max Passive Income — Best Business Setup 2026", duration: "9-12 mins", sections: ["Intro — why passive income matters early game", "Best business combos ranked with exact numbers", "Step-by-step upgrade order walkthrough", "Daily reset routine for max Pixels", "Outro + CTA"] }, thumbnail_texts: ["MAX PIXEL INCOME GUIDE 💰", "PASSIVE MONEY IN NTE", "TYCOON TRICK NO ONE TALKS ABOUT"], hashtags: ["#NTE", "#NevernessToEverness", "#NTEtycoon", "#gachagaming", "#NTEguide"], urgency: "low", urgency_reason: "Evergreen content — works any time, no rush to publish." }, generated_at: "2026-05-29T09:01:00Z" },
  { post: { title: "Beginner progression guide — what to prioritise your first two weeks", link: "#", summary: "Returning player who made every possible mistake on a fresh account. Wrote everything I wish I knew: which resources to hoard, which banners to skip, daily login priorities, and what to ignore early on. Covers weeks one and two in full detail.", published: "2026-05-28T14:45:00Z", source_name: "r/NevernessToEverness" }, plan: { hook: "New to NTE? Here are the mistakes that will waste your first two weeks", content_type: "Beginner Guide", short_form: { platform: "TikTok / YouTube Shorts", duration: "50s", script_outline: ["Hook — 'don't make these week 1 mistakes'", "List the 3 biggest early progression errors", "Show the correct priority order quickly", "CTA — save this before you start playing"] }, long_form: { title: "NTE Beginner Guide 2026 — What To Do In Your First 2 Weeks", duration: "12-15 mins", sections: ["Intro — why early decisions matter a lot in NTE", "Days 1-3: what to focus on immediately", "Week 1: resource management and daily habits", "Week 2: first banner decisions and team building", "Outro + what to watch next on the channel"] }, thumbnail_texts: ["BEGINNER GUIDE 2026 🎮", "DON'T MAKE THESE MISTAKES", "WEEK 1 NTE PROGRESSION GUIDE"], hashtags: ["#NTE", "#NevernessToEverness", "#NTEbeginner", "#gachagaming", "#NTEguide"], urgency: "medium", urgency_reason: "Evergreen but high search volume — good to publish any time, sooner is better." }, generated_at: "2026-05-29T09:02:00Z" }
];

let loading = false;
let currentPlatform = 'reddit';

function pickPlatform(btn) {
  document.querySelectorAll('.platform-btn:not([disabled])').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentPlatform = btn.dataset.platform;
  loadFeed();
}

function refresh() { if (!loading) loadFeed(); }

async function loadFeed() {
  if (loading) return;
  loading = true;
  const btn = document.getElementById('btn-refresh');
  btn.classList.add('spinning');
  document.getElementById('feed-meta').textContent = 'fetching guides...';
  document.getElementById('feed-count').textContent = '—';

  document.getElementById('feed').innerHTML = [1,2,3].map(() => `
    <div class="skeleton">
      <div style="display:flex;gap:8px;margin-bottom:14px">
        <div class="skel-line" style="width:52px"></div>
        <div class="skel-line" style="width:90px"></div>
        <div class="skel-line" style="width:110px"></div>
      </div>
      <div class="skel-line" style="width:72%;height:15px;margin-bottom:18px"></div>
      <div class="skel-line"></div>
      <div class="skel-line" style="width:92%"></div>
      <div class="skel-line" style="width:68%"></div>
    </div>`).join('');

  await new Promise(r => setTimeout(r, 800));

  let data = [], live = false;
  try {
    const res = await fetch(`/api/content?limit=6&platform=${currentPlatform}`);
    if (res.ok) { const j = await res.json(); if (j.success && j.data?.length) { data = j.data; live = true; } }
  } catch(e) {}
  if (!data.length) data = MOCK;

  document.getElementById('s-total').textContent = data.length;
  document.getElementById('s-done').textContent  = data.length;
  document.getElementById('s-queue').textContent = 0;
  document.getElementById('feed-count').textContent = data.length;
  document.getElementById('feed-meta').textContent =
    `${data.length} guides · ${live ? 'live' : 'demo'} · ${new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}`;

  if (!data.length) {
    document.getElementById('feed').innerHTML = `<div class="empty"><svg viewBox="0 0 24 24" stroke-width="1.5"><path d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg><p>No guide posts found right now.<br><b>Try refreshing in a few minutes.</b></p></div>`;
  } else {
    document.getElementById('feed').innerHTML = data.map((item, i) => card(item, i)).join('');
  }

  btn.classList.remove('spinning');
  loading = false;
}

function card(item, i) {
  const { post, plan } = item;
  const id = 'c' + i;
  const ub = plan.urgency === 'high' ? '<span class="badge b-urg-h">⚡ high urgency</span>'
           : plan.urgency === 'medium' ? '<span class="badge b-urg-m">● medium</span>'
           : '<span class="badge b-urg-l">● low</span>';
  const ds = post.published ? new Date(post.published).toLocaleDateString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}) : '';
  const wc = post.summary ? Math.round(post.summary.split(' ').length)+'w' : '';
  const ss = (plan.short_form?.script_outline||[]).map((s,n)=>'<li><span class="step-n">'+(n+1)+'</span>'+s+'</li>').join('');
  const ls = (plan.long_form?.sections||[]).map((s,n)=>'<li><span class="step-n">'+(n+1)+'</span>'+s+'</li>').join('');
  const th = (plan.thumbnail_texts||[]).map(t=>'<div class="thumb-card"><p>'+t+'</p></div>').join('');
  const tg = (plan.hashtags||[]).map(h=>'<span class="hashtag" onclick="copyTag(\'' + h + '\')">'+h+'</span>').join('');
  const thumb = post.thumbnail ? '<a href="'+post.link+'" target="_blank" rel="noopener" class="card-thumb"><img src="'+post.thumbnail+'" alt="" loading="lazy"/></a>' : '';
  return '<div class="card" style="animation-delay:'+i*90+'ms" id="'+id+'">' +
    '<div class="card-top">' +
      '<div class="card-badges">' +
        '<span class="badge b-done">Done</span>' +
        '<span class="badge b-type">'+(plan.content_type||'Guide')+'</span>' +
        '<span class="b-date">'+ds+'</span>' +
        ub +
      '</div>' +
      '<div class="card-meta">'+(wc?'<span>'+wc+'</span>':'')+'<span>'+(post.source_name||'Reddit')+'</span></div>' +
    '</div>' +
    '<div class="card-title"><a href="'+post.link+'" target="_blank" rel="noopener">'+post.title+'</a></div>' +
    '<div class="card-body">' +
      '<div class="card-body-text">' +
        '<div class="card-tabs">' +
          '<button class="tab-btn active" onclick="tab(\'' + id + '\',\'s\',this)">Summary</button>' +
          '<button class="tab-btn" onclick="tab(\'' + id + '\',\'p\',this)">Content Plan</button>' +
          '<button class="tab-btn" onclick="tab(\'' + id + '\',\'t\',this)">Thumbnails</button>' +
          '<span class="tab-model">gemini-1.5-flash</span>' +
        '</div>' +
        '<div class="pane active" id="'+id+'-s">' +
          (plan.hook ? '<div class="hook-line">'+plan.hook+'</div>' : '') +
          '<div class="summary-box">' +
            '<svg viewBox="0 0 24 24" stroke-width="1.5"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>' +
            '<p>'+(post.summary||'No summary available.')+'</p>' +
          '</div>' +
        '</div>' +
        '<div class="pane" id="'+id+'-p">' +
          '<div class="plan-block">' +
            '<div class="plan-label"><svg viewBox="0 0 24 24" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="2"/><path d="M9 7h6M9 11h6M9 15h4"/></svg>Short-form — '+(plan.short_form?.platform||'TikTok / Shorts')+' · '+(plan.short_form?.duration||'')+'</div>' +
            '<ul class="step-list">'+ss+'</ul>' +
          '</div>' +
          '<div class="plan-block">' +
            '<div class="plan-label"><svg viewBox="0 0 24 24" stroke-width="2"><path d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/><path d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>Long-form — YouTube · '+(plan.long_form?.duration||'')+'</div>' +
            (plan.long_form?.title ? '<div class="yt-title">'+plan.long_form.title+'</div>' : '') +
            '<ul class="step-list">'+ls+'</ul>' +
          '</div>' +
          (plan.urgency_reason ? '<div class="urg-note">⏱ '+plan.urgency_reason+'</div>' : '') +
        '</div>' +
        '<div class="pane" id="'+id+'-t"><div class="thumb-grid">'+th+'</div></div>' +
      '</div>' +
      thumb +
    '</div>' +
    '<div class="hashtag-row">'+tg+'</div>' +
  '</div>';
}

function tab(id, pane, btn) {
  document.querySelectorAll(`#${id} .tab-btn`).forEach(b=>b.classList.remove('active'));
  document.querySelectorAll(`#${id} .pane`).forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(`${id}-${pane}`).classList.add('active');
}

let toastT;
function copyTag(tag) {
  navigator.clipboard.writeText(tag).catch(()=>{});
  const t = document.getElementById('toast');
  document.getElementById('toast-msg').textContent = `Copied ${tag}`;
  t.classList.add('show');
  clearTimeout(toastT);
  toastT = setTimeout(()=>t.classList.remove('show'), 2200);
}

loadFeed();
</script>
</body>
</html>
